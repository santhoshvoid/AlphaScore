app = "alphacross-worker"
primary_region = "sin"   # Singapore — closest to India for IST market hours

[build]
  # Fly auto-detects Python; if you have a Dockerfile use that instead

[env]
  # All secrets are set via: fly secrets set KEY=VALUE
  # Do NOT put actual values here

[[services]]
  # Celery worker + beat — no HTTP ports needed
  internal_port = 8080
  protocol      = "tcp"

  [[services.ports]]
    port = 8080

[processes]
  worker = "celery -A celery_app worker --beat --loglevel=info --concurrency=1"